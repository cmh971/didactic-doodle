<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 · Page not found · Sentinel</title>
  <link rel="icon" href="favicon.ico" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="legal-page">
  <div class="bg-orbs" aria-hidden="true"><span class="orb orb-1"></span><span class="orb orb-2"></span><span class="orb orb-3"></span></div>

  <main class="err-page">
    <div class="err-code">404</div>
    <h1>This page wandered off. 🧭</h1>
    <p class="muted">The page you're looking for doesn't exist, moved, or never did. Let's get you back on track.</p>
    <div class="err-actions">
      <a href="/" class="btn primary big">🏠 Go home</a>
      <a href="/dashboard" class="btn big ghost">Open dashboard</a>
    </div>
    <div class="err-links">
      <a href="/commands">Commands</a> · <a href="/docs">Docs</a> · <a href="/status">Status</a> · <a href="/changelog">Changelog</a>
    </div>
  </main>

  <script>
    (function () {
      var t = localStorage.getItem('theme') || 'dark';
      if (t !== 'light' && t !== 'dark') t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</body>
</html>
