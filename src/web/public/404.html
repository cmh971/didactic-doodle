<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 · Page not found · Sentinel</title>
  <link rel="icon" href="favicon.ico" />
  <link rel="stylesheet" href="style.css" />
  <style>
    :root {
      --bg: #05070d;
      --accent: #5865f2;
      --accent-soft: #8893ff;
      --danger: #e74c3c;
      --text: #e6edf3;
      --muted: #9aa7b4;
      --panel: #111827;
      --border: #1f2937;
      --radius: 18px;
    }

    body.legal-page {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background:
        radial-gradient(circle at 10% -10%, rgba(88,101,242,0.35), transparent 55%),
        radial-gradient(circle at 90% 110%, rgba(231,76,60,0.35), transparent 55%),
        linear-gradient(135deg, #020617, #05070d);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .err-page {
      position: relative;
      z-index: 2;
      max-width: 720px;
      margin: 40px 16px;
      padding: 40px 28px 32px;
      border-radius: var(--radius);
      background: radial-gradient(circle at top left, rgba(88,101,242,0.18), transparent 55%), var(--panel);
      border: 1px solid rgba(148,163,184,0.35);
      box-shadow: 0 24px 80px rgba(15,23,42,0.9);
      text-align: center;
    }

    .err-code {
      font-size: 4.5rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 10px;
      background: linear-gradient(120deg, var(--accent), var(--danger));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 24px rgba(88,101,242,0.6);
      animation: codePulse 3s infinite ease-in-out;
    }

    @keyframes codePulse {
      0% { transform: translateY(0); filter: drop-shadow(0 0 10px rgba(88,101,242,0.4)); }
      50% { transform: translateY(-4px); filter: drop-shadow(0 0 26px rgba(88,101,242,0.9)); }
      100% { transform: translateY(0); filter: drop-shadow(0 0 10px rgba(88,101,242,0.4)); }
    }

    h1 {
      margin: 0;
      font-size: 2.1rem;
      font-weight: 800;
    }

    .muted {
      margin-top: 12px;
      margin-bottom: 24px;
      font-size: 0.98rem;
      color: var(--muted);
      line-height: 1.7;
    }

    .err-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px 22px;
      border-radius: 999px;
      border: 1px solid var(--border);
      font-size: 0.98rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, border-color 0.18s ease;
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-soft));
      color: #fff;
      border-color: transparent;
      box-shadow: 0 12px 30px rgba(88,101,242,0.55);
    }

    .btn.ghost {
      background: transparent;
      color: var(--text);
      border-color: rgba(148,163,184,0.6);
    }

    .btn.big {
      padding-inline: 26px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 40px rgba(15,23,42,0.9);
    }

    .btn.primary:hover {
      filter: brightness(1.05);
    }

    .btn.ghost:hover {
      background: rgba(15,23,42,0.9);
    }

    .err-links {
      margin-top: 10px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .err-links a {
      color: var(--accent-soft);
      text-decoration: none;
    }

    .err-links a:hover {
      text-decoration: underline;
    }

    .bg-orbs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0.7;
      mix-blend-mode: screen;
      animation: floatOrb 18s infinite ease-in-out;
    }

    .orb-1 {
      width: 260px;
      height: 260px;
      top: -40px;
      left: 10%;
      background: radial-gradient(circle, rgba(88,101,242,0.6), transparent 70%);
    }

    .orb-2 {
      width: 320px;
      height: 320px;
      bottom: -80px;
      right: 5%;
      background: radial-gradient(circle, rgba(231,76,60,0.6), transparent 70%);
      animation-delay: -4s;
    }

    .orb-3 {
      width: 220px;
      height: 220px;
      top: 40%;
      left: 70%;
      background: radial-gradient(circle, rgba(56,189,248,0.5), transparent 70%);
      animation-delay: -8s;
    }

    @keyframes floatOrb {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-30px, -40px) scale(1.15); }
      100% { transform: translate(0, 0) scale(1); }
    }

    @media (max-width: 640px) {
      .err-page {
        margin: 24px 12px;
        padding: 32px 20px 26px;
      }
      .err-code {
        font-size: 3.4rem;
      }
      h1 {
        font-size: 1.7rem;
      }
      .err-actions {
        flex-direction: column;
      }
      .btn.big {
        width: 100%;
        justify-content: center;
      }
    }

    /* Respect users who ask their device to minimize motion. */
    @media (prefers-reduced-motion: reduce) {
      .err-code, .orb { animation: none; }
    }
  </style>
</head>
<body class="legal-page">
  <div class="bg-orbs" aria-hidden="true">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
  </div>

  <main class="err-page">
    <div class="err-code">404</div>
    <h1>This page wandered off. 🧭</h1>
    <p class="muted">
      The page you're looking for doesn't exist, moved, or never did.<br>
      Let's get you back on track.
    </p>
    <div class="err-actions">
      <a href="/" class="btn primary big">🏠 Go home</a>
      <a href="/dashboard" class="btn big ghost">Open dashboard</a>
    </div>
    <div class="err-links">
      <a href="/commands">Commands</a> ·
      <a href="/docs">Docs</a> ·
      <a href="/status">Status</a> ·
      <a href="/changelog">Changelog</a>
    </div>
  </main>

  <script>
    (function () {
      var t = localStorage.getItem('theme') || 'dark';
      if (t !== 'light' && t !== 'dark') {
        t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      }
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</body>
</html>
